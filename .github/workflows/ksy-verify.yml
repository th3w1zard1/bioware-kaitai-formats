# URL anchors, optional vendor line drift, and Kaitai compile smoke (Python target).
name: KSY verification

on:
  push:
    branches: [main, master]
    paths:
      - "formats/**/*.ksy"
      - "formats/coverage/**"
      - "docs/XOREOS_FORMAT_COVERAGE.md"
      - "AGENTS.md"
      - "README.md"
      - "scripts/verify_ksy_urls.py"
      - "scripts/check_vendor_xoreos_xref_lines.py"
      - "scripts/report_filetype_ksy_coverage.py"
      - "src/python/tests/**"
      - "pytest.ini"
      - ".cursorrules"
      - ".github/workflows/ksy-verify.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "formats/**/*.ksy"
      - "formats/coverage/**"
      - "docs/XOREOS_FORMAT_COVERAGE.md"
      - "AGENTS.md"
      - "README.md"
      - "scripts/verify_ksy_urls.py"
      - "scripts/check_vendor_xoreos_xref_lines.py"
      - "scripts/report_filetype_ksy_coverage.py"
      - "src/python/tests/**"
      - "pytest.ini"
      - ".cursorrules"
      - ".github/workflows/ksy-verify.yml"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Init xoreos vendor trees (for local line-range check)
        run: |
          git submodule update --init vendor/xoreos vendor/xoreos-tools vendor/xoreos-docs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest kaitai-struct-compiler==0.11

      - name: verify_ksy_urls (xoreos master #L bands)
        run: |
          python scripts/verify_ksy_urls.py --check-xoreos-github-line-ranges --also docs/XOREOS_FORMAT_COVERAGE.md

      - name: check_vendor_xoreos_xref_lines (on-disk vendor)
        run: |
          python scripts/check_vendor_xoreos_xref_lines.py --also docs/XOREOS_FORMAT_COVERAGE.md

      - name: report_filetype_ksy_coverage (MISSING / DRIFT)
        run: |
          python scripts/report_filetype_ksy_coverage.py --vendor-types-h vendor/xoreos/src/aurora/types.h

      - name: pytest (compile all .ksy to Python)
        run: |
          python -m pytest -q
